name: Participations

on: [push]

permissions:
  contents: write

jobs:
  presence:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git pull --rebase origin main

      - name: Use jq
        run: echo '{"name":"GitHub"}' | jq '.name'

      - name: Use PowerShell
        run: pwsh --version

      - shell: bash
        run: |
          # (your evaluation logic unchanged)
          cd 0.PlanDeCours && bash .scripts/run.sh && cd ..
          cd P.Programmation/1.IDE && bash .scripts/run.sh && cd ../2.Jupyter && bash .scripts/run.sh && cd ../..
          cd 1.Domaines && pwsh .scripts/run.ps1 && cd ..
          cd 2.MySQL && pwsh .scripts/run.ps1 && cd ..
          cd 3.Postgres && pwsh .scripts/run.ps1 && cd ..
          cd 4.DCL && pwsh .scripts/run.ps1 && cd ..
          cd 5.ModelisationSQL && pwsh .scripts/run.ps1 && cd ..
          cd 6.BATCH && pwsh .scripts/run.ps1 && cd ..
          cd 7.PLSQL && pwsh .scripts/run.ps1 && cd ..
          cd 8.NoSQL && pwsh .scripts/run.ps1 && cd ..

      - name: Commit changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git commit -am "Vérification de la participation" || echo "No changes"

      - name: Final rebase safety
        run: |
          git pull --rebase origin main

      - name: Push changes
        run: |
          git push origin main
